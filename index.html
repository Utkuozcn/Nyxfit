<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#2a2431">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="images/icon-192.png">
<link rel="apple-touch-icon" href="images/icon-180.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NyxFit">
<title>NyxFit — Kişisel Koçunuz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#2a2431; --navy-deep:#1c1822; --navy-mid:#3c3547;
  --orange:#a81f33; --orange-soft:#f9e6e9; --orange-deep:#8f1a2b;
  --green:#b0863a; --green-deep:#8f6c2c;
  --purple:#7a4a58;
  --ink:#14212e; --sub:#5a6b7b; --faint:#8a99a8;
  --head:#241c2a; --border-strong:#cabfca;
  --paper:#eef1f4; --card:#ffffff; --line:#e3e8ed; --line2:#eef2f5;
  --body-bg1:#e6dfe6; --body-bg2:#cbc2cc;
  --shadow:0 1px 2px rgba(20,50,80,.05), 0 8px 24px rgba(20,50,80,.06);
  --shadow-lg:0 12px 40px rgba(13,36,57,.16);
  --r:16px; --r-sm:11px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:#c3ccd6;
  background-image:radial-gradient(1200px 600px at 50% -10%, var(--body-bg1) 0%, var(--body-bg2) 60%);
  color:var(--ink); line-height:1.5; min-height:100vh;
  display:flex; align-items:flex-start; justify-content:center;
  padding:0; -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:'Oswald',sans-serif;font-weight:600;margin:0;letter-spacing:.2px}
.mono-num{font-variant-numeric:tabular-nums}

/* ---------- PHONE FRAME ---------- */
#phone{
  position:relative; width:100%; max-width:440px; min-height:100vh;
  background:var(--paper); overflow:hidden; display:flex; flex-direction:column;
}
@media(min-width:480px){
  body{padding:26px 0 40px; align-items:center}
  #phone{min-height:calc(100vh - 66px); height:900px; max-height:900px;
    border-radius:44px; box-shadow:var(--shadow-lg),0 0 0 11px #10151b,0 0 0 13px #2a3440;
    overflow:hidden}
}

/* ---------- APP HEADER ---------- */
#topbar{
  flex:0 0 auto; background:var(--navy); color:#fff; padding:16px 18px 14px;
  display:flex; align-items:center; gap:12px; position:relative; z-index:5;
}
#topbar .logo{width:36px;height:36px;border-radius:10px;overflow:hidden;flex:0 0 auto;box-shadow:0 4px 12px rgba(0,0,0,.3);cursor:pointer}
#topbar .logo svg{width:100%;height:100%;display:block}
#topbar .logo img{width:100%;height:100%;display:block;object-fit:cover}
#report .r-brand img{width:38px;height:38px;border-radius:9px;display:block;flex:0 0 auto}

#topbar .brand{display:flex;flex-direction:column;line-height:1.05}
#topbar .brand b{font-family:'Oswald';font-weight:700;font-size:19px;letter-spacing:.6px;color:var(--orange)}
#topbar .brand span{font-size:10.5px;color:#a9c0d6;font-weight:500;letter-spacing:.3px;text-transform:uppercase}
#topbar .iconbtn{margin-left:auto;width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);color:#dceaf6;display:grid;place-items:center;cursor:pointer;flex:0 0 auto;transition:.15s}
#topbar .iconbtn:active{transform:scale(.92);background:rgba(255,255,255,.22)}
#topbar .iconbtn svg{width:18px;height:18px}
#topbar .sci{margin-left:8px;display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;
  color:#cfe0ef;background:rgba(255,255,255,.09);padding:6px 9px;border-radius:20px;cursor:pointer;
  border:1px solid rgba(255,255,255,.12);transition:.15s}
#topbar .sci:active{background:rgba(255,255,255,.2)}
#topbar .sci svg{width:12px;height:12px}

/* ---------- PROGRESS ---------- */
#progress{flex:0 0 auto;background:var(--navy);padding:0 18px 14px;display:flex;flex-direction:column;gap:9px}
#progress .plabel{display:flex;justify-content:space-between;align-items:center}
#progress .plabel .pstep{font-family:'Oswald';font-weight:600;font-size:11.5px;letter-spacing:1.2px;text-transform:uppercase;color:#ffcf9a;display:flex;align-items:center;gap:6px}
#progress .plabel .pstep b{background:var(--orange);color:#fff;border-radius:6px;padding:2px 7px;font-size:11px;letter-spacing:.5px}
#progress .plabel .pname{font-size:11.5px;color:#bcd0e4;font-weight:600}
#progress .bars{display:flex;gap:6px}
#progress .seg{height:5px;flex:1;background:rgba(255,255,255,.22);border-radius:3px;overflow:hidden}
#progress .seg i{display:block;height:100%;width:0;background:var(--orange);border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1)}
#progress .seg.done i{width:100%}
#progress .seg.active i{width:100%}
#progress .seg.active{box-shadow:0 0 0 2px rgba(239,125,0,.35)}

/* ---------- SCROLL AREA ---------- */
#app{flex:1 1 auto;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;position:relative}
.screen{padding:22px 18px 26px;animation:slideIn .38s cubic-bezier(.16,1,.3,1)}
@keyframes slideIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){.screen{animation:none}*{transition:none!important}}

.eyebrow{font-family:'Oswald';font-weight:600;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--orange);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.eyebrow .step-n{background:var(--orange);color:#fff;width:20px;height:20px;border-radius:6px;display:grid;place-items:center;font-size:11px}
.q-title{font-size:27px;font-weight:600;line-height:1.12;color:var(--head);letter-spacing:.2px}
.q-sub{color:var(--sub);font-size:13.5px;margin-top:8px;line-height:1.55}

/* ---------- FOOTER NAV ---------- */
#navbar{flex:0 0 auto;background:var(--card);border-top:1px solid var(--line);padding:12px 16px calc(12px + env(safe-area-inset-bottom));display:flex;gap:10px;align-items:center;position:relative;z-index:5}
.btn{font-family:'Oswald';font-weight:600;letter-spacing:.5px;border:none;border-radius:13px;cursor:pointer;transition:transform .12s,box-shadow .12s,background .15s;font-size:15px;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(.97)}
.btn-primary{flex:1;background:var(--orange);color:#fff;padding:15px 18px;box-shadow:0 6px 16px rgba(239,125,0,.32)}
.btn-primary:disabled{background:#cdd6de;color:#fff;box-shadow:none;cursor:not-allowed}
.btn-primary.go{background:var(--green);box-shadow:0 6px 16px rgba(90,160,44,.34)}
.btn-ghost{background:var(--card);color:var(--head);padding:15px 17px;border:1.5px solid var(--border-strong)}
.btn-back{background:var(--card);color:var(--head);padding:15px 16px;font-size:14px;border:1.5px solid var(--border-strong);flex:0 0 auto}
.btn-back svg{width:18px;height:18px}
.btn svg{width:17px;height:17px}

/* ---------- GENDER CARDS ---------- */
.gender-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-top:24px}
.gcard{background:var(--card);border:2px solid var(--line);border-radius:var(--r);padding:14px 12px 16px;cursor:pointer;text-align:center;transition:.18s;position:relative;overflow:hidden}
.gcard .imgwrap{height:260px;display:flex;align-items:flex-end;justify-content:center;overflow:hidden;margin-bottom:10px}
.gcard img{height:100%;max-width:100%;width:auto;object-fit:contain;display:block;filter:drop-shadow(0 6px 10px rgba(20,50,80,.12))}
.gcard .lbl{font-family:'Oswald';font-weight:600;font-size:17px;color:var(--head);letter-spacing:.5px;position:relative;z-index:2}
.gcard:active{transform:scale(.98)}
.gcard.sel{border-color:var(--orange);background:var(--orange-soft);box-shadow:0 8px 22px rgba(239,125,0,.18)}
.gcard.sel .lbl{color:var(--orange-deep)}
.gcard .check{position:absolute;top:10px;right:10px;width:24px;height:24px;border-radius:50%;background:var(--orange);display:none;place-items:center}
.gcard.sel .check{display:grid}
.gcard .check svg{width:14px;height:14px}

/* ---------- BODY TYPE SLIDER ---------- */
.bodyslider{margin-top:20px}
.bodystage{background:var(--card);border-radius:var(--r);border:1px solid var(--line);padding:18px 10px 12px;box-shadow:var(--shadow)}
.bodystage .figrow{height:270px;display:flex;align-items:flex-end;justify-content:center;position:relative;overflow:hidden}
.bodystage .figrow img{height:100%;width:auto;max-width:100%;object-fit:contain;filter:drop-shadow(0 8px 14px rgba(20,50,80,.16));transition:.15s}
.bodyinfo{text-align:center;margin-top:6px}
.bodyinfo .name{font-family:'Oswald';font-weight:600;font-size:19px;color:var(--head);letter-spacing:.4px}
.bodyinfo .bf{display:inline-flex;align-items:center;gap:6px;margin-top:6px;background:var(--navy);color:#fff;font-size:12px;font-weight:600;padding:5px 12px;border-radius:20px;font-family:'Inter'}
.bodyinfo .bf b{color:#ffd8a8}
.leveltrack{display:flex;gap:5px;justify-content:center;margin-top:14px;padding:0 4px}
.leveltrack .lv{flex:1;max-width:34px;height:7px;border-radius:4px;background:var(--line);transition:.2s}
.leveltrack .lv.on{background:var(--orange)}
.leveltrack .lv.cur{background:var(--navy);transform:scaleY(1.5)}
.bodynav{display:flex;align-items:center;justify-content:space-between;margin-top:16px;gap:10px}
.arrowbtn{width:46px;height:46px;border-radius:50%;border:1.5px solid var(--border-strong);background:var(--card);display:grid;place-items:center;cursor:pointer;transition:.15s;flex:0 0 auto;box-shadow:var(--shadow)}
.arrowbtn:active{transform:scale(.92);background:var(--paper)}
.arrowbtn:disabled{opacity:.35;cursor:not-allowed}
.arrowbtn svg{width:20px;height:20px;color:var(--head)}
.bodydots{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;flex:1}
.bodydots .d{width:8px;height:8px;border-radius:50%;background:var(--line);cursor:pointer;transition:.2s}
.bodydots .d.on{background:var(--orange);width:22px;border-radius:5px}
.muscle-toggle{margin-top:16px;display:flex;gap:8px;background:var(--paper);padding:5px;border-radius:12px}
.muscle-toggle button{flex:1;border:none;background:transparent;padding:10px;border-radius:9px;font-family:'Oswald';font-weight:600;font-size:13px;color:var(--sub);cursor:pointer;letter-spacing:.3px;transition:.15s}
.muscle-toggle button.on{background:var(--card);color:var(--head);box-shadow:var(--shadow)}

/* ---------- GOAL GRID ---------- */
.goal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:22px}
.goalcard{background:var(--card);border:2px solid var(--line);border-radius:var(--r);padding:18px 14px;cursor:pointer;transition:.16s;position:relative;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center}
.goalcard .ico{width:56px;height:56px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.goalcard .ico img{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;display:block}
.goalcard .g-name{font-family:'Oswald';font-weight:600;font-size:15px;color:var(--head);letter-spacing:.3px;line-height:1.1}
.goalcard .g-desc{font-size:10.5px;color:var(--faint);line-height:1.35}
.goalcard:active{transform:scale(.98)}
.goalcard.sel{border-color:var(--orange);background:var(--orange-soft)}
.goalcard.sel .g-name{color:var(--orange-deep)}
.goalcard .check{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;background:var(--orange);display:none;place-items:center}
.goalcard.sel .check{display:grid}
.goalcard .check svg{width:12px;height:12px}

/* ---------- FORM ---------- */
.formgroup{margin-top:20px}
.flabel{font-family:'Oswald';font-weight:600;font-size:13px;letter-spacing:.6px;text-transform:uppercase;color:var(--head);margin-bottom:9px;display:flex;align-items:center;gap:7px}
.flabel .req{color:var(--orange);font-size:15px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{position:relative}
.field input{width:100%;border:1.5px solid var(--border-strong);border-radius:12px;padding:14px 44px 14px 15px;font-size:16px;font-family:'Inter';font-weight:600;color:var(--ink);background:var(--card);transition:.15s;outline:none}
.field input::placeholder{color:var(--faint);font-weight:400}
.field input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(239,125,0,.12)}
.field .unit{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--faint);font-weight:600;pointer-events:none}
.field.full input{padding-right:15px}

.segmented{display:flex;background:var(--paper);border-radius:12px;padding:4px;gap:3px;flex-wrap:wrap;border:1px solid var(--line)}
.segmented button{flex:1 1 0;min-width:0;border:none;background:transparent;padding:11px 6px;border-radius:9px;font-family:'Inter';font-weight:600;font-size:12.5px;color:var(--sub);cursor:pointer;transition:.14s;white-space:nowrap}
.segmented button.on{background:var(--card);color:var(--head);box-shadow:var(--shadow)}
.segmented.stack{flex-direction:column}
.segmented.stack button{flex:none;text-align:left;padding:13px 14px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.segmented.stack button .sm{font-size:11px;color:var(--faint);font-weight:500}
.segmented.stack button.on .sm{color:var(--sub)}

.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{border:1.5px solid var(--border-strong);background:var(--card);border-radius:11px;padding:11px 15px;font-family:'Oswald';font-weight:600;font-size:14px;color:var(--sub);cursor:pointer;transition:.14s;letter-spacing:.3px}
.chip.on{border-color:var(--orange);background:var(--orange);color:#fff}
.chip:active{transform:scale(.96)}
.daychips{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.daychip{border:1.5px solid var(--border-strong);background:var(--card);border-radius:12px;padding:14px 4px;text-align:center;cursor:pointer;transition:.14s}
.daychip b{font-family:'Oswald';font-size:20px;color:var(--head);display:block;line-height:1}
.daychip span{font-size:9px;color:var(--faint);text-transform:uppercase;letter-spacing:.4px}
.daychip.on{border-color:var(--orange);background:var(--orange)}
.daychip.on b,.daychip.on span{color:#fff}

textarea.notes{width:100%;border:1.5px solid var(--border-strong);border-radius:12px;padding:13px 15px;font-family:'Inter';font-size:14px;color:var(--ink);resize:none;outline:none;min-height:64px}
textarea.notes:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(239,125,0,.12)}

/* ---------- WELCOME ---------- */
.welcome{padding:0}
.hero{background:var(--navy);color:#fff;padding:40px 24px 34px;position:relative;overflow:hidden}
.hero:before{content:"";position:absolute;top:-60px;right:-40px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(239,125,0,.35),transparent 70%)}
.hero .kick{font-family:'Oswald';font-weight:600;letter-spacing:3px;font-size:12px;color:var(--orange);text-transform:uppercase;position:relative}
.hero h1{font-size:38px;font-weight:700;line-height:1.02;margin-top:12px;letter-spacing:.5px;position:relative}
.hero h1 em{font-style:normal;color:var(--orange)}
.hero p{color:#b9cee0;font-size:14px;margin-top:14px;line-height:1.6;max-width:330px;position:relative}
.hero .badges{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap;position:relative}
.hero .badge{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);border-radius:20px;padding:7px 13px;font-size:11px;font-weight:600;color:#dceaf6;display:flex;align-items:center;gap:6px}
.hero .badge svg{width:13px;height:13px;color:var(--orange)}
.wsteps{padding:24px 22px 8px}
.wstep{display:flex;gap:14px;align-items:flex-start;padding:14px 0;border-bottom:1px solid var(--line2)}
.wstep:last-child{border-bottom:none}
.wstep .n{flex:0 0 auto;width:40px;height:40px;border-radius:12px;background:var(--orange-soft);color:var(--orange-deep);display:grid;place-items:center;font-family:'Oswald';font-weight:700;font-size:18px}
.wstep .tx b{font-family:'Oswald';font-weight:600;font-size:15px;color:var(--head);display:block;letter-spacing:.3px}
.wstep .tx span{font-size:12.5px;color:var(--sub);line-height:1.45}

/* ---------- RESULT ---------- */
.result{padding:0}
.rhero{background:linear-gradient(160deg,var(--navy),var(--navy-deep));color:#fff;padding:26px 20px 24px;position:relative;overflow:hidden}
.rhero:before{content:"";position:absolute;bottom:-70px;left:-30px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(90,160,44,.32),transparent 70%)}
.rhero .greet{font-size:12.5px;color:#a9c0d6;position:relative}
.rhero .rname{font-family:'Oswald';font-weight:700;font-size:28px;letter-spacing:.4px;margin-top:2px;position:relative}
.rhero .rgoal{display:inline-flex;align-items:center;gap:7px;margin-top:12px;background:rgba(239,125,0,.16);border:1px solid rgba(239,125,0,.3);color:#ffcf9a;padding:7px 14px;border-radius:20px;font-size:12.5px;font-weight:600;position:relative}
.rstats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(255,255,255,.1);margin-top:20px;border-radius:14px;overflow:hidden;position:relative}
.rstats .rs{background:var(--navy);padding:13px 8px;text-align:center}
.rstats .rs b{font-family:'Oswald';font-weight:700;font-size:22px;display:block;line-height:1}
.rstats .rs b.g{color:#8fd85f}.rstats .rs b.o{color:#ffb266}
.rstats .rs span{font-size:9.5px;color:#9fb6cb;text-transform:uppercase;letter-spacing:.4px;margin-top:4px;display:block}

.rsection{padding:20px 18px 4px}
.rsection>h3{font-family:'Oswald';font-weight:600;font-size:14px;letter-spacing:1.4px;text-transform:uppercase;color:var(--head);display:flex;align-items:center;gap:9px;margin-bottom:14px}
.rsection>h3 .bar{width:4px;height:16px;background:var(--orange);border-radius:2px}
.rsection>h3 .ref{margin-left:auto;font-family:'Inter';font-weight:600;font-size:10px;letter-spacing:0;text-transform:none;color:var(--orange-deep);background:var(--orange-soft);padding:3px 8px;border-radius:8px;cursor:pointer}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;margin-bottom:12px}
.macro-card{padding:16px}
.macro-top{display:flex;align-items:center;gap:16px}
.donut{width:132px;height:132px;flex:0 0 auto;position:relative}
.donut .ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.donut .ctr b{font-family:'Oswald';font-weight:700;font-size:22px;color:var(--head);line-height:1}
.donut .ctr span{font-size:9px;color:var(--faint);text-transform:uppercase;letter-spacing:.5px}
.macro-legend{flex:1;display:flex;flex-direction:column;gap:9px}
.mleg{display:flex;align-items:center;gap:9px}
.mleg .dot{width:11px;height:11px;border-radius:3px;flex:0 0 auto}
.mleg .ml-n{font-size:12.5px;color:var(--sub);font-weight:600;flex:1}
.mleg .ml-v{font-family:'Oswald';font-weight:600;font-size:16px;color:var(--head)}
.mleg .ml-v small{font-size:10px;color:var(--faint);font-weight:400;margin-left:3px;font-family:'Inter'}
.mleg .ml-pct{font-family:'Oswald';font-weight:700;font-size:12px;color:var(--head);background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:1px 8px;margin-right:9px;min-width:40px;text-align:center;letter-spacing:.2px;flex:0 0 auto}
.micro-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:15px;padding-top:15px;border-top:1px dashed var(--line)}
.micro{text-align:center}
.micro b{font-family:'Oswald';font-weight:600;font-size:15px;color:var(--head);display:block}
.micro span{font-size:9.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.3px}

.kcal-strip{background:var(--orange);color:#fff;border-radius:14px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;box-shadow:0 6px 16px rgba(168,31,51,.28)}
.kcal-strip .kl{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;opacity:.92}
.kcal-strip .kv{font-family:'Oswald';font-weight:700;font-size:30px;letter-spacing:.5px}
.kcal-strip .kv small{font-size:14px;font-weight:500;margin-left:4px}
.kcal-strip svg{width:30px;height:30px;opacity:.85}

.energy-rows{padding:6px 4px}
.injury-chips{display:flex;flex-wrap:wrap;gap:8px}
.injchip{background:var(--card);border:1.5px solid var(--line);color:var(--sub);border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;transition:.14s;font-family:inherit}
.injchip:active{transform:scale(.97)}
.injchip.on{background:var(--orange-soft);border-color:var(--orange);color:var(--orange-deep)}
.vol-rows{padding:4px 2px;display:flex;flex-direction:column;gap:9px}
.vrow{display:flex;align-items:center;gap:10px}
.vrow .vn{flex:0 0 108px;font-size:12px;font-weight:600;color:var(--head);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vrow .vn .vmin{color:var(--faint)}
.vrow .vbar{flex:1 1 auto;height:8px;background:rgba(130,130,150,.16);border-radius:5px;overflow:hidden;min-width:0}
.vrow .vbar i{display:block;height:100%;border-radius:5px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.vrow .vv{flex:0 0 auto;font-family:'Oswald';font-weight:600;font-size:14px;color:var(--head);white-space:nowrap;text-align:right;min-width:78px}
.vrow .vv .vu{font-size:10px;color:var(--faint);font-weight:400}
.vrow .vv .vst{font-family:'Inter';font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-left:3px}
.vol-note{font-size:10.5px;color:var(--faint);line-height:1.45;margin-top:9px;padding:0 2px}
.vol-h-sub{font-size:10.5px;color:var(--faint);font-weight:500;text-transform:none;letter-spacing:0;margin-left:auto}
.tk-top{display:flex;gap:10px;align-items:center;margin-bottom:12px}
.tk-week{flex:1 1 auto;background:var(--card);border:1.5px solid var(--line);color:var(--head);border-radius:10px;padding:9px 12px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer}
.tk-save{flex:0 0 auto;background:var(--orange);color:#fff;border:none;border-radius:10px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;transition:.15s}
.tk-save:active{transform:scale(.97)}
.tk-save.saved{background:#3b8f4e}
.tk-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.tk-field{display:flex;flex-direction:column;gap:3px}
.tk-field label{font-size:11px;color:var(--sub);font-weight:600}
.tk-field input{background:rgba(130,130,150,.09);border:1.5px solid var(--line);color:var(--head);border-radius:8px;padding:8px 10px;font-size:14px;font-family:inherit;width:100%}
.tk-field input:focus{outline:none;border-color:var(--orange)}
.tc-box{margin-top:14px;border-top:1px solid var(--line);padding-top:11px}
.tc-title{font-family:'Oswald';font-weight:600;font-size:12px;letter-spacing:.5px;text-transform:uppercase;color:var(--orange);margin-bottom:7px}
.tc-row{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;padding:2.5px 0}
.tc-row .tc-n{color:var(--sub)}
.tc-row .tc-d{color:var(--head);font-weight:500}
.tc-empty{font-size:11.5px;color:var(--faint);line-height:1.45}
.tk-note{font-size:10.5px;color:var(--faint);line-height:1.45;margin-top:9px;padding:0 2px}
.phase-banner{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-left:4px solid var(--orange);border-radius:12px;padding:12px 14px;margin:0 0 4px}
.phase-banner .pb-l{flex:1 1 auto;min-width:0}
.phase-banner .pb-lbl{font-family:'Oswald';font-weight:700;font-size:13.5px;letter-spacing:.3px;margin-bottom:3px}
.phase-banner .pb-note{font-size:11.5px;color:var(--sub);line-height:1.4}
.phase-banner .pb-r{flex:0 0 auto;text-align:center;background:rgba(130,130,150,.1);border-radius:9px;padding:6px 12px}
.phase-banner .pb-r span{display:block;font-size:9px;color:var(--faint);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.phase-banner .pb-r b{font-family:'Oswald';font-size:18px;color:var(--head)}
.big-update{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:transparent;color:var(--orange);border:1.5px solid var(--orange);border-radius:13px;padding:13px;font-size:14.5px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:10px;transition:.15s}
.big-update:active{transform:scale(.99)}
.big-update:hover{background:var(--orange-soft)}
.upd-wrap{display:flex;flex-direction:column;gap:14px}
.upd-info{font-size:13px;color:var(--sub);line-height:1.5;background:rgba(130,130,150,.08);border-radius:10px;padding:11px 13px}
.upd-info b{color:var(--head)}
.upd-field{display:flex;flex-direction:column;gap:5px}
.upd-field label{font-size:13px;font-weight:600;color:var(--head)}
.upd-field input{background:rgba(130,130,150,.09);border:1.5px solid var(--line);color:var(--head);border-radius:10px;padding:11px 13px;font-size:17px;font-family:'Oswald';font-weight:600;width:100%}
.upd-field input:focus{outline:none;border-color:var(--orange)}
.upd-hint{font-size:11px;color:var(--faint);line-height:1.4}
.upd-preview{border:1px solid var(--line);border-radius:12px;padding:13px}
.upv-lbl{font-family:'Oswald';font-weight:700;font-size:15px;margin-bottom:9px}
.upv-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13.5px;color:var(--sub)}
.upv-row b{font-family:'Oswald';font-size:16px;color:var(--head)}
.upv-note{font-size:12px;color:var(--sub);line-height:1.5;margin-top:8px;padding-top:9px;border-top:1px solid var(--line)}
.upd-adv{font-size:12.5px;line-height:1.5;border-radius:10px;padding:11px 13px;font-weight:500}
.upd-adv.warn{background:#fdf3e7;color:#8a5a12;border:1px solid #f0d6a8}
.upd-adv.ok{background:#eef7f0;color:#2e6b3e;border:1px solid #cbe6d2}
.upd-adv.note{background:rgba(130,130,150,.08);color:var(--sub);border:1px solid var(--line)}
.upd-cite{font-size:11px;color:var(--faint);line-height:1.5}
.upd-apply{background:var(--orange);color:#fff;border:none;border-radius:13px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
.upd-apply:active{transform:scale(.99)}
.erow{display:flex;align-items:center;padding:11px 12px;border-bottom:1px solid var(--line2)}
.erow:last-child{border-bottom:none}
.erow .ei{width:30px;height:30px;border-radius:9px;background:var(--navy);display:grid;place-items:center;flex:0 0 auto;margin-right:11px}
.erow .ei svg{width:15px;height:15px;color:#fff}
.erow .el{flex:1}
.erow .el b{font-size:13px;color:var(--ink);font-weight:600;display:block}
.erow .el span{font-size:10.5px;color:var(--faint)}
.erow .ev{font-family:'Oswald';font-weight:600;font-size:17px;color:var(--head)}

/* ---------- WORKOUT DAYS ---------- */
.daytabs{display:flex;gap:7px;overflow-x:auto;padding:2px 0 12px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.daytabs::-webkit-scrollbar{display:none}
.daytab{flex:0 0 auto;border:1.5px solid var(--border-strong);background:var(--card);border-radius:12px;padding:9px 15px;cursor:pointer;transition:.14s;text-align:center;min-width:76px}
.daytab b{font-family:'Oswald';font-weight:600;font-size:13px;color:var(--head);display:block;line-height:1.1}
.daytab span{font-size:9px;color:var(--faint);text-transform:uppercase;letter-spacing:.3px}
.daytab.on{border-color:var(--head);background:var(--navy)}
.daytab.on b,.daytab.on span{color:#fff}
.daytab.on span{color:#a9c0d6}

.dayfocus{display:flex;align-items:center;gap:10px;background:var(--navy);color:#fff;border-radius:13px 13px 0 0;padding:13px 16px;margin-bottom:0}
.dayfocus .df-t{flex:1}
.dayfocus .df-t b{font-family:'Oswald';font-weight:600;font-size:16px;letter-spacing:.4px;display:block}
.dayfocus .df-t span{font-size:11px;color:#a9c0d6}
.dayfocus .rpe{background:rgba(239,125,0,.2);border:1px solid rgba(239,125,0,.34);color:#ffcf9a;border-radius:9px;padding:5px 10px;font-size:10.5px;font-weight:600;text-align:center;line-height:1.3}
.exlist{background:var(--card);border:1px solid var(--line);border-top:none;border-radius:0 0 14px 14px;overflow:hidden;margin-bottom:12px}
.exrow{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid var(--line2);gap:11px}
.exrow:last-child{border-bottom:none}
.exrow .exn{width:26px;height:26px;border-radius:8px;background:var(--orange-soft);color:var(--orange-deep);display:grid;place-items:center;font-family:'Oswald';font-weight:700;font-size:13px;flex:0 0 auto}
.exrow .exinfo{flex:1;min-width:0}
.exrow .exinfo b{font-size:13.5px;color:var(--ink);font-weight:600;display:block;line-height:1.2}
.exrow .exinfo .exmeta{font-size:10.5px;color:var(--faint);display:block}
.exrow .exinfo .exdesc{font-size:10.5px;color:var(--sub);display:block;line-height:1.35;margin-top:3px}
.exrow .exinfo .exalt{font-size:10px;color:var(--orange-deep);display:block;line-height:1.3;margin-top:3px;font-weight:500;display:flex;align-items:flex-start;gap:0}
.exrow .exinfo .exalt svg{color:var(--orange-deep)}
.exrow .exsets{display:flex;gap:10px;flex:0 0 auto;text-align:center}
.exrow .exsets .ss b{font-family:'Oswald';font-weight:600;font-size:15px;color:var(--head);display:block;line-height:1}
.exrow .exsets .ss span{font-size:9px;color:var(--faint);text-transform:uppercase;letter-spacing:.3px}

/* generic info cards / lists */
.infocard{padding:15px 16px}
.infocard.navy{background:var(--navy);color:#fff;border:none}
.infocard.navy .ic-h{color:#fff}
.ic-h{font-family:'Oswald';font-weight:600;font-size:14px;letter-spacing:.6px;color:var(--head);display:flex;align-items:center;gap:9px;margin-bottom:12px}
.ic-h svg{width:17px;height:17px;color:var(--orange)}
.tips{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:10px}
.tips li{display:flex;gap:10px;font-size:12.5px;line-height:1.45;color:var(--sub)}
.tips li svg{width:15px;height:15px;flex:0 0 auto;color:var(--green);margin-top:1px}
.infocard.navy .tips li{color:#cddced}
.infocard.navy .tips li svg{color:var(--orange)}

.cardio-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:2px}
.cardio-item{background:var(--paper);border-radius:11px;padding:12px}
.cardio-item .ci-l{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:3px}
.cardio-item .ci-v{font-family:'Oswald';font-weight:600;font-size:15px;color:var(--head)}

/* evidence chips */
.evid{display:inline-flex;align-items:center;gap:4px;font-size:9.5px;font-weight:600;color:var(--orange-deep);background:var(--orange-soft);padding:2px 6px;border-radius:6px;vertical-align:middle;margin-left:5px;cursor:pointer}
.evid svg{width:9px;height:9px}

/* ---------- BOTTOM ACTIONS on result ---------- */
.result-actions{padding:16px 18px 8px}
.big-pdf{width:100%;background:var(--orange);color:#fff;border:none;border-radius:15px;padding:17px;font-family:'Oswald';font-weight:700;font-size:17px;letter-spacing:.6px;display:flex;align-items:center;justify-content:center;gap:11px;cursor:pointer;box-shadow:0 8px 22px rgba(239,125,0,.34);transition:transform .12s}
.big-pdf:active{transform:scale(.98)}
.big-pdf svg{width:21px;height:21px}
.mini-actions{display:flex;gap:10px;margin-top:11px}
.mini-actions button{flex:1;background:var(--card);border:1.5px solid var(--border-strong);border-radius:13px;padding:13px;font-family:'Oswald';font-weight:600;font-size:13px;color:var(--head);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;letter-spacing:.3px;transition:.14s}
.mini-actions button:active{background:var(--paper)}
.mini-actions button svg{width:15px;height:15px}
.disclaimer{font-size:10.5px;color:var(--faint);line-height:1.5;text-align:center;padding:16px 24px 30px}
/* --- ana ekran iki seçenek --- */
.home-actions{display:flex;flex-direction:column;gap:12px;padding:22px 22px 4px}
.homecard{display:flex;align-items:center;gap:14px;width:100%;text-align:left;background:var(--card);border:1.5px solid var(--border-strong);border-radius:16px;padding:15px 16px;cursor:pointer;transition:.14s;box-shadow:var(--shadow)}
.homecard:active{transform:scale(.99)}
.homecard .hc-ic{width:46px;height:46px;border-radius:13px;background:var(--orange-soft);color:var(--orange-deep);display:grid;place-items:center;flex:0 0 auto}
.homecard .hc-ic svg{width:24px;height:24px}
.homecard .hc-tx{flex:1;min-width:0}
.homecard .hc-tx b{font-family:'Oswald';font-weight:600;font-size:17px;color:var(--head);display:block;letter-spacing:.3px;line-height:1.15}
.homecard .hc-tx span{font-size:12px;color:var(--sub);display:block;margin-top:2px}
.homecard .hc-arrow{flex:0 0 auto;color:var(--faint);display:flex;align-items:center}
.homecard .hc-arrow svg{width:22px;height:22px}
.hc-new{background:linear-gradient(135deg,var(--orange-deep),var(--orange));border-color:transparent;box-shadow:0 8px 22px rgba(168,31,51,.28)}
.hc-new .hc-tx b,.hc-new .hc-tx span{color:#fff}
.hc-new .hc-arrow{color:rgba(255,255,255,.9)}
.hc-new .hc-ic{background:rgba(255,255,255,.18);color:#fff}
.hc-saved .hc-ic{background:var(--paper);color:var(--head)}
.hc-badge{background:var(--orange);color:#fff;font-family:'Oswald';font-weight:700;font-size:14px;min-width:26px;height:26px;border-radius:13px;display:grid;place-items:center;padding:0 7px}
/* --- danışan listesi --- */
.ccount{background:var(--orange-soft);color:var(--orange-deep);font-family:'Oswald';font-weight:700;font-size:16px;padding:1px 9px;border-radius:9px;margin-left:6px;vertical-align:2px}
.clientlist{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.clientrow{display:flex;align-items:center;gap:12px;background:var(--card);border:1.5px solid var(--border-strong);border-radius:14px;padding:11px 12px;cursor:pointer;transition:.14s;box-shadow:var(--shadow)}
.clientrow:active{transform:scale(.995)}
.clientrow .cl-av{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--orange-deep),var(--orange));color:#fff;display:grid;place-items:center;font-family:'Oswald';font-weight:700;font-size:19px;flex:0 0 auto}
.clientrow .cl-info{flex:1;min-width:0}
.clientrow .cl-info b{font-size:15px;color:var(--ink);font-weight:600;display:block;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.clientrow .cl-info span{font-size:11px;color:var(--faint);display:block;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.clientrow .cl-del{flex:0 0 auto;width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--paper);color:var(--faint);display:grid;place-items:center;cursor:pointer;transition:.14s}
.clientrow .cl-del:hover{color:#fff;background:var(--orange-deep);border-color:var(--orange-deep)}
.clientrow .cl-del svg{width:18px;height:18px}
.empty-clients{display:flex;flex-direction:column;align-items:center;gap:20px;margin-top:36px}
.empty-clients .ec-ic{width:78px;height:78px;border-radius:22px;background:var(--paper);color:var(--faint);display:grid;place-items:center}
.empty-clients .ec-ic svg{width:38px;height:38px}
.empty-clients .big-new{width:100%;justify-content:center;flex:none}
/* --- kaydet butonu (result) --- */
.big-save{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;background:var(--navy);color:#fff;border:none;border-radius:15px;padding:15px;font-family:'Oswald';font-weight:600;font-size:15.5px;letter-spacing:.5px;cursor:pointer;transition:.16s;margin-bottom:11px}
.big-save:active{transform:scale(.99)}
.big-save.saved{background:var(--green-deep)}
.big-save svg{width:20px;height:20px}

/* ---------- DRAWER (references) ---------- */
.overlay{position:absolute;inset:0;background:rgba(13,24,36,.55);z-index:40;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(2px)}
.overlay.show{opacity:1;pointer-events:auto}
.drawer{position:absolute;left:0;right:0;bottom:0;max-height:86%;background:var(--paper);z-index:41;border-radius:24px 24px 0 0;transform:translateY(100%);transition:transform .35s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column;box-shadow:0 -10px 40px rgba(0,0,0,.2)}
.drawer.show{transform:translateY(0)}
.drawer .grip{width:40px;height:4px;background:#cdd6de;border-radius:3px;margin:10px auto 4px}
.drawer .dh{padding:8px 20px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.drawer .dh h3{font-family:'Oswald';font-weight:700;font-size:19px;color:var(--head);flex:1;letter-spacing:.3px}
.drawer .dh .x{width:32px;height:32px;border-radius:50%;background:var(--card);border:1px solid var(--line);display:grid;place-items:center;cursor:pointer}
.drawer .dh .x svg{width:16px;height:16px;color:var(--sub)}
.drawer .dbody{overflow-y:auto;padding:16px 20px 30px;-webkit-overflow-scrolling:touch}
.refnote{font-size:12px;color:var(--sub);line-height:1.55;background:var(--card);border:1px solid var(--line);border-left:3px solid var(--orange);border-radius:10px;padding:12px 14px;margin-bottom:16px}
.refitem{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:10px}
.refitem .rtag{font-family:'Oswald';font-weight:600;font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:var(--orange-deep);background:var(--orange-soft);display:inline-block;padding:3px 8px;border-radius:6px;margin-bottom:7px}
.refitem .rcite{font-size:12px;color:var(--ink);line-height:1.5;font-weight:500}
.refitem .rcite em{color:var(--sub);font-style:italic}
.refitem .rfind{font-size:11.5px;color:var(--sub);margin-top:6px;line-height:1.5}
.refitem .rfind b{color:var(--head)}

/* ---------- PDF LOADING ---------- */
.pdf-loading{position:absolute;inset:0;background:rgba(13,24,36,.82);z-index:60;display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;backdrop-filter:blur(3px)}
.pdf-loading.show{display:flex}
.pdf-loading .spin{width:52px;height:52px;border:4px solid rgba(255,255,255,.2);border-top-color:var(--orange);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.pdf-loading p{color:#fff;font-family:'Oswald';font-weight:500;font-size:15px;letter-spacing:.5px}
.pdf-loading small{color:#a9c0d6;font-size:12px;margin-top:-10px}

/* toast */
.toast{position:absolute;left:50%;bottom:90px;transform:translateX(-50%) translateY(20px);background:var(--navy-deep);color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:500;z-index:70;opacity:0;transition:.3s;pointer-events:none;box-shadow:var(--shadow-lg);max-width:88%;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* helper */
.hidden{display:none!important}
.report-host{position:fixed;left:-99999px;top:0;width:794px;background:#fff}

/* ---- strateji / ağırlık rehberi / kardiyo (app) ---- */
.rhero .rstrategy{display:flex;align-items:flex-start;gap:7px;margin-top:10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);color:#e4eef7;padding:9px 12px;border-radius:12px;font-size:11.5px;font-weight:500;line-height:1.45;position:relative}
.rhero .rstrategy svg{width:14px;height:14px;color:var(--orange);flex:0 0 auto;margin-top:1px}
.loadtable{border:1px solid var(--line);border-radius:11px;overflow:hidden}
.loadtable .lt-head,.loadtable .lt-row{display:grid;grid-template-columns:1.15fr 1fr .75fr;gap:6px;padding:9px 12px;font-size:12px;align-items:center}
.loadtable .lt-head{background:var(--paper);font-family:'Oswald';font-weight:600;font-size:10px;letter-spacing:.4px;text-transform:uppercase;color:var(--sub)}
.loadtable .lt-row{border-top:1px solid var(--line2);color:var(--sub)}
.loadtable .lt-row span:nth-child(2){color:var(--faint);font-size:11px}
.loadtable .lt-row b{font-family:'Oswald';font-weight:600;color:var(--orange-deep);text-align:right;font-size:12.5px}
.cardio-head{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px}
.cardio-head .ch-item{background:var(--paper);border-radius:11px;padding:11px 13px;text-align:center}
.cardio-head .ch-item span{display:block;font-size:9.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.4px;font-weight:600;margin-bottom:3px}
.cardio-head .ch-item b{font-family:'Oswald';font-weight:700;font-size:17px;color:var(--head)}
.cardio-sess{border:1px solid var(--line);border-left:3px solid var(--orange);border-radius:10px;padding:11px 13px;margin-bottom:9px;background:var(--card)}
.cardio-sess .cs-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px;flex-wrap:wrap}
.cardio-sess .cs-top b{font-family:'Oswald';font-weight:600;font-size:13.5px;color:var(--head);letter-spacing:.2px}
.cardio-sess .cs-freq{font-size:11px;color:var(--orange-deep);font-weight:700;white-space:nowrap}
.cardio-sess .cs-zone{font-size:11.5px;color:var(--sub);font-weight:600;margin-top:5px}
.cardio-sess .cs-desc{font-size:11.5px;color:var(--faint);line-height:1.45;margin-top:4px}
.cardio-note{display:flex;gap:8px;align-items:flex-start;background:var(--orange-soft);border-radius:10px;padding:10px 12px;margin-top:2px;font-size:11.5px;color:var(--sub);line-height:1.45}
.cardio-note svg{width:14px;height:14px;color:var(--green);flex:0 0 auto;margin-top:1px}
.exrow .exsets .ss .loadtag{font-size:8.6px;color:var(--orange-deep);text-transform:none;letter-spacing:0;font-weight:700;display:block;margin-top:2px}

/* ---- report: strategy line, cardio, RPE/RIR mini ---- */
#report .strat-line{font-size:9px;color:#5a6b7b;margin-top:6px;line-height:1.4}
#report .strat-line b{color:var(--navy);font-family:'Oswald';font-weight:600}
#report .cardio-meta{display:flex;gap:14px;flex-wrap:wrap;font-size:9.5px;color:#5a6b7b;margin-bottom:9px;border-bottom:1px dashed #dce3ea;padding-bottom:8px}
#report .cardio-meta b{color:var(--navy);font-family:'Oswald';font-weight:600;margin-right:3px}
#report .rcardio-sess{border-left:2px solid var(--orange);padding:2px 0 3px 9px;margin-bottom:6px}
#report .rcardio-sess .rcs-t{font-size:10px;color:#14212e}
#report .rcardio-sess .rcs-t b{font-family:'Oswald';font-weight:600;color:var(--navy)}
#report .rcardio-sess .rcs-d{font-size:8.5px;color:#5a6b7b;line-height:1.35}
#report .rcardio-note{font-size:8.5px;color:#8a99a8;font-style:italic;margin-top:4px}
#report .rpe-mini{font-size:8.6px;color:#3a4a5a;line-height:1.4;margin-bottom:6px}
#report table.loadmini{width:100%;border-collapse:collapse}
#report table.loadmini td{font-size:8.6px;padding:2px 3px;border-top:1px solid #eef2f5}
#report table.loadmini td:first-child{color:#14212e;font-weight:600}
#report table.loadmini td:nth-child(2){color:#8a99a8}
#report table.loadmini td:last-child{color:#a81f33;font-family:'Oswald';font-weight:600;text-align:right}

/* ---- vücut seviye etiketi ---- */
.levelrow{display:flex;justify-content:center;margin-top:12px}
.lvl-label{font-family:'Oswald';font-weight:600;font-size:12px;letter-spacing:.6px;color:var(--head);background:var(--paper);padding:4px 13px;border-radius:20px;border:1px solid var(--line)}
/* ---- hareket ikonu + opsiyonel (app) ---- */
.exicon{display:inline-flex;width:15px;height:15px;color:var(--orange);vertical-align:-2px;margin-right:6px}
.exicon svg{width:15px;height:15px}
.optbadge{display:inline-block;font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--orange-deep);background:var(--orange-soft);padding:1px 6px;border-radius:6px;margin-left:6px;vertical-align:1px}
.exrow.exopt{background:var(--orange-soft)}
.exrow.exopt .exn{background:var(--orange);color:#fff}
[data-theme="dark"] .exrow.exopt{background:rgba(194,54,75,.12)}
/* --- gün yöntemi + teknik rozeti + alternatif hareket paneli --- */
.daymethod{background:var(--paper);border:1px solid var(--line);border-top:none;font-size:11px;color:var(--sub);line-height:1.42;padding:9px 14px;display:flex;gap:7px;align-items:flex-start}
.daymethod svg{width:13px;height:13px;color:var(--orange-deep);flex:0 0 auto;margin-top:1px}
.daymethod b{color:var(--head);font-weight:600}
.techbadge{display:inline-block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.2px;color:#fff;background:var(--orange);padding:1.5px 7px;border-radius:6px;margin-left:6px;vertical-align:1px}
.exrow{cursor:pointer}
.exchev{flex:0 0 auto;width:16px;color:var(--faint);display:flex;align-items:center}
.exchev svg{width:16px;height:16px}
.exitem{border-bottom:1px solid var(--line2)}
.exitem:last-child{border-bottom:none}
.exitem .exrow{border-bottom:none}
.exitem.open{background:var(--paper)}
.exitem.open .exrow{background:transparent}
.exopts{padding:2px 14px 12px}
.opt-swap{width:100%;display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;font-weight:600;color:#fff;background:var(--orange-deep);border:none;border-radius:9px;padding:9px 12px;cursor:pointer;transition:.14s}
.opt-swap:active{transform:scale(.99)}
.opt-swap:disabled{color:var(--faint);background:var(--line2);cursor:default}
.opt-swap svg{width:13px;height:13px}
.swappanel{margin-top:9px;border:1px solid var(--line);border-radius:10px;background:var(--card);overflow:hidden}
.swappanel .sp-h{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--sub);padding:9px 11px;background:var(--paper);border-bottom:1px solid var(--line)}
.swappanel .sp-h svg{width:12px;height:12px;color:var(--orange-deep)}
.swappanel .sp-h .sp-x{margin-left:auto;cursor:pointer;color:var(--faint);font-size:14px;font-weight:700;padding:0 4px;line-height:1}
.swappanel .sp-list{display:flex;flex-direction:column;max-height:270px;overflow:auto;-webkit-overflow-scrolling:touch}
.swapopt{display:flex;flex-direction:column;align-items:flex-start;gap:2px;text-align:left;padding:9px 11px;border:none;border-bottom:1px solid var(--line2);background:transparent;cursor:pointer;transition:.12s;width:100%}
.swapopt:last-child{border-bottom:none}
.swapopt:hover{background:var(--orange-soft)}
.swapopt.cur{background:var(--orange-soft);cursor:default}
.swapopt .so-n{font-size:12.5px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:6px;width:100%}
.swapopt .so-m{font-size:10px;color:var(--faint)}
.swapopt .so-rec{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--green-deep);background:rgba(176,134,58,.16);padding:1px 5px;border-radius:5px}
.swapopt .so-cur-badge{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--orange-deep);background:var(--card);border:1px solid var(--orange-deep);padding:0 5px;border-radius:5px;margin-left:auto}
.swappanel .sp-note{font-size:9.5px;color:var(--faint);line-height:1.42;padding:8px 11px;background:var(--paper);border-top:1px solid var(--line)}
.restnote{font-size:10px;color:var(--faint);line-height:1.42;padding:10px 4px 0;display:flex;gap:6px;align-items:flex-start}
.restnote svg{width:12px;height:12px;flex:0 0 auto;margin-top:1px}
.restnote b{color:var(--sub);font-weight:600}
/* ---- rapor: marka, hareket ikonu, opsiyonel ---- */
#report .r-head{display:flex;align-items:center;gap:14px}
#report .r-head h1{flex:1;text-align:center;font-size:21px}
#report .r-brand{display:flex;align-items:center;gap:9px;flex:0 0 auto}
#report .r-brand svg{width:36px;height:36px;border-radius:9px;flex:0 0 auto}
#report .r-brand-tx b{font-family:'Oswald';font-weight:700;font-size:16px;color:#fff;display:block;letter-spacing:.5px;line-height:1}
#report .r-brand-tx span{font-size:8.5px;color:#d8c3cc;display:block;margin-top:2px}
#report .rexicon{display:inline-flex;width:11px;height:11px;color:var(--orange);vertical-align:-1px;margin-right:4px}
#report .rexicon svg{width:11px;height:11px}
#report table.extbl tr.exoptrow{background:#fbf3f4}
#report .roptbadge{font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:#8f1a2b;background:#f2dee1;padding:0 4px;border-radius:4px;margin-left:4px;vertical-align:1px}
#report .extbl .exname{display:flex;align-items:center;flex-wrap:wrap;gap:0}

/* --- yatay takip sayfası + kompakt/dinamik antrenman --- */
#report{overflow:visible}
#report .pg-land{width:1123px;height:794px;padding:14px 26px;overflow:hidden}
#report .pg.pg-land{width:1123px;height:794px;min-height:794px;padding:14px 26px}
#report .pg-land .r-head-red{background:#8f1a2b}

#report .pg-land .r-head h1{font-size:22px}
#report .pg-land .r-head{margin-bottom:7px;padding:7px 22px}

#report .pg-land table.track{margin-top:14px}

#report .pg-land table.track th.mh{text-align:left;padding-left:14px}
#report .pg-land table.track td{padding:0 8px;height:72px;vertical-align:middle;border:none}
#report .pg-land .track-wrap{width:100%}
#report .pg-land table.track{width:100%;border-collapse:collapse}
#report .pg-land .r-foot{margin-top:8px;padding-top:8px}
#report .pg-land .r-evidence{margin-top:7px;font-size:8px;line-height:1.35}
#report .pg-land table.track td.rl{font-size:14.5px;padding-left:16px;border:none}
#report .pg-land table.track td .tv{font-family:'Oswald';font-weight:700;font-size:17px;color:#8f1a2b}
#report .pg-land table.track th.ch{background:#5f5766;color:#fff}
#report .pg-land table.track td.ch{background:#f4eef7;font-family:'Oswald';font-weight:700;font-size:17px}
#report table.track th.ch{background:#5f5766}
#report table.track td.ch{background:#f6f0f2;font-weight:700}
#report table.track td .gl{display:block;width:78%;margin:0 auto;border-bottom:2px solid #8a8f96;height:28px}
#report .track-foot{justify-content:flex-end;border-top:2px solid #8f1a2b;margin-top:6px;padding-top:6px}
#report .pg-land .r-evidence{margin-top:12px;font-size:9px}
/* dinamik gün kartı boyutları */
#report .days-grid.sz-lg .daycol .dc-h{font-size:15px;padding:11px 14px}
#report .days-grid.sz-lg table.extbl th{font-size:9.5px;padding:8px 12px 5px}
#report .days-grid.sz-lg table.extbl td{font-size:12.5px;padding:8px 12px}
#report .days-grid.sz-lg table.extbl td.c{font-size:13px}
#report .days-grid.sz-lg .extbl .exd{font-size:9.5px}
#report .days-grid.sz-lg .extbl .exa{font-size:9.5px}
#report .days-grid.sz-lg .daycol .dc-f{font-size:11px;padding:9px 14px}
#report .days-grid.sz-lg table.extbl td.c .ld{font-size:9px}
#report .days-grid.sz-md .daycol .dc-h{font-size:13px;padding:9px 12px}

/* ================= KOYU TEMA ================= */
[data-theme="dark"]{
  --paper:#1e1a22; --card:#2a2430; --ink:#f2edf2; --sub:#b3a9b6; --faint:#897f8c;
  --head:#f4eef4; --line:#3a3342; --line2:#2c2733; --border-strong:#4e4557;
  --orange:#c2364b; --orange-soft:#3a2028; --orange-deep:#eb8f9c;
  --green:#c39a4a; --green-deep:#a07e34;
  --body-bg1:#171319; --body-bg2:#0e0b10;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 26px rgba(0,0,0,.45);
  --shadow-lg:0 16px 44px rgba(0,0,0,.6);
}
[data-theme="dark"] #topbar,[data-theme="dark"] #progress{background:var(--navy-deep)}
/* seçili & aktif durumlar koyuda turuncu ağırlıklı */
[data-theme="dark"] .segmented button.on{background:var(--orange);color:#fff;box-shadow:none}
[data-theme="dark"] .segmented.stack button.on .sm{color:#ffe6cf}
[data-theme="dark"] .muscle-toggle button.on{background:var(--orange);color:#fff}
[data-theme="dark"] .daytab.on{background:var(--orange);border-color:var(--orange)}
[data-theme="dark"] .daytab.on b{color:#fff}
[data-theme="dark"] .daytab.on span{color:#ffe6cf}
[data-theme="dark"] .leveltrack .lv.cur{background:var(--orange)}
[data-theme="dark"] .gcard.sel,[data-theme="dark"] .goalcard.sel{box-shadow:0 8px 22px rgba(239,125,0,.24)}
[data-theme="dark"] .drawer .grip{background:#4a515c}
[data-theme="dark"] .btn-primary:disabled{background:#3a4048;color:#8b939d}
[data-theme="dark"] .field input:disabled{background:#20242b!important}
[data-theme="dark"] .kcal-strip{box-shadow:0 6px 16px rgba(168,31,51,.22)}
[data-theme="dark"] .hc-new{background:#a81f33}
[data-theme="dark"] .macro-legend .ml-v,[data-theme="dark"] .micro b,[data-theme="dark"] .cardio-item .ci-v{color:var(--head)}
[data-theme="dark"] .cardio-item{background:#20242b}

/* ================= PDF REPORT (A4 794px) ================= */
#report{--head:#2a2431;width:794px;background:#fff;font-family:'Inter',sans-serif;color:#1a2733;font-size:11px;line-height:1.4}
#report .pg{width:794px;min-height:1123px;padding:26px 30px;background:#fff;position:relative}

/* ============================================================
   HESAPLAMA MOTORU (deterministik, kanıta dayalı)
   ============================================================ */
const round = (n,s=1)=>Math.round(n/s)*s;
const clamp = (n,a,b)=>Math.max(a,Math.min(b,n));
function bmrMifflin(sex,kg,cm,age){ const base=10*kg+6.25*cm-5*age; return sex==="male"?base+5:base-161; }
function bmiCat(bmi){ if(bmi<18.5)return "Zayıf"; if(bmi<25)return "Normal"; if(bmi<30)return "Fazla Kilolu"; if(bmi<35)return "Obez (I)"; return "Obez (II+)"; }

/* Yağlılık sınıfı: kalori & egzersiz kararlarını yönlendirir */
function adiposity(sex, bf, bmi){
  const hi = sex==="male"?20:30, lo = sex==="male"?12:22;
  if(bf>=hi || bmi>=30) return "high";
  if(bf<lo) return "low";
  return "mid";
}
/* Hedef × yağlılık -> kalori ayarı (kilolu her zaman AÇIK) */
function kcalAdjust(goalKey, adi){
  const t={
    slim:    {high:-0.22, mid:-0.20, low:-0.17},
    fit:     {high:-0.18, mid:-0.10, low:-0.05},
    muscle:  {high:-0.15, mid:+0.08, low:+0.12},
    strength:{high:-0.12, mid:+0.03, low:+0.08},
    health:  {high:-0.10, mid: 0.00, low: 0.00},
    cardio:  {high:-0.15, mid:-0.10, low:-0.05},
  };
  return t[goalKey][adi];
}
function strategyLabel(goalKey, kcalAdj){
  if(kcalAdj<0 && (goalKey==="muscle"||goalKey==="strength"||goalKey==="fit"))
    return "Rekomposizyon — kalori açığı + yüksek protein (yağ yakarken kas koru/geliştir)";
  if(kcalAdj<0) return "Yağ kaybı — kalori açığı + yüksek protein ile kas koruma";
  if(kcalAdj>0) return "Kas kütlesi artışı — kontrollü kalori fazlası (temiz bulk)";
  return "Koruma / rekomp — bakım kalorisi + yüksek protein";
}
/* Egzersiz zorluk tavanı: başlangıç & kilolu -> makine/güvenli */
function skillCap(expId, adi, bodyLevel, musc){
  let cap = expId==="beg"?1 : expId==="int"?2 : 3;
  if(adi==="high") cap=Math.min(cap, expId==="adv"?2:1);
  if(bodyLevel<=1 && !musc) cap=Math.min(cap,1);
  if(musc) cap=Math.max(cap,2); // kaslı yapı: makineyle sınırlı kalma, serbest ağırlık ver
  return cap;
}
/* Günlük egzersiz sayısı: hedef + tecrübe */
function dayCounts(goalKey, expId){
  let m,a;
  if(goalKey==="strength"){m=3;a=2;}
  else if(goalKey==="muscle"){m=3;a=4;}
  else if(goalKey==="fit"){m=2;a=4;}
  else if(goalKey==="slim"){m=2;a=4;}
  else if(goalKey==="cardio"){m=2;a=3;}
  else {m=2;a=3;}
  if(expId==="beg") a=Math.max(2,a-1);
  if(expId==="adv") a=a+1;
  return {main:m, aux:a};
}
/* Ekipman tercihi (makine/kablo önceliği) */
function eqPref(eq, role, goalKey, cap){
  if(cap<=1) return ({machine:6,cable:5,bw:3,band:2,dumbbell:2,barbell:0})[eq]||0;
  if(role==="aux") return ({machine:4,cable:5,dumbbell:3,bw:2,band:1,barbell:1})[eq]||0;
  if(role==="main"){
    if(goalKey==="strength") return ({barbell:6,machine:3,dumbbell:3,cable:2,bw:2,band:0})[eq]||0;
    return ({barbell:3,machine:4,dumbbell:3,cable:3,bw:2,band:1})[eq]||0;
  }
  return 0;
}
/* Tekrar -> ağırlık hissi */
function loadTag(lo){
  if(lo<=5) return "ağır";
  if(lo<=8) return "orta-ağır";
  if(lo<=12) return "orta";
  if(lo<=15) return "orta-hafif";
  return "hafif-orta";
}
function fmtRest(rest){
  if(rest>=90){ const a=(Math.round(rest/60*10)/10).toString().replace(".0",""); const b=(Math.round((rest+60)/60*10)/10).toString().replace(".0",""); return a+"-"+b+" dk"; }
  return rest+"-"+(rest+30)+" sn";
}
function trainingStyle(goalKey){
  if(goalKey==="strength") return {tag:"Kuvvet · ağır setler, uzun dinlenme", superset:false, method:"Düz setler · ağır yük, tekniğe öncelik · uzun dinlenme (2–3+ dk)", tech:"strength"};
  if(goalKey==="muscle")   return {tag:"Hipertrofi · düz setler, kontrollü tempo", superset:false, method:"Düz setler · progresif aşırı yük · izolasyonların SON setinde başarısızlığa yakın (RIR 0–1) · kontrollü eksantrik (2–3 sn)", tech:"myo"};
  if(goalKey==="slim"||goalKey==="cardio") return {tag:"Metabolik · süperset & kısa dinlenme", superset:true, method:"Süperset/devre · kısa dinlenme · yüksek yoğunluk, maksimum kalori yakımı", tech:"ss"};
  if(goalKey==="fit")      return {tag:"Rekomp · süperset & kısa dinlenme, metabolik yoğunluk", superset:true, method:"İzolasyonlar SÜPERSET (sırayla, aralıksız) · kısa dinlenme · bileşiklerde yükü koru (kası koru, yağı yak)", tech:"ss"};
  return {tag:"Genel · dengeli tempo", superset:false, method:"Düz setler · dengeli tempo", tech:""};
}

function computeEngine(D){
  const sex=D.sex, kg=+D.weight, cm=+D.height, age=+D.age;
  const goal=GOALS[D.goal];
  const act=ACTIVITY.find(a=>a.id===D.activity);
  const exp=EXPERIENCE.find(e=>e.id===D.experience);
  const bf=D.body.bf;
  const bmi=kg/Math.pow(cm/100,2);
  const adi=adiposity(sex, bf, bmi);

  // --- energy ---
  const bmr=bmrMifflin(sex,kg,cm,age);
  const tdee=bmr*act.f;
  const kcalAdj=kcalAdjust(D.goal, adi);
  const target=tdee*(1+kcalAdj);
  const lbm=kg*(1-bf/100), fm=kg-lbm, ffmi=lbm/Math.pow(cm/100,2);
  const deficit = kcalAdj<0;

  // --- macros (protein LBM-tabanlı: Helms) ---
  let protein_g=(deficit?2.6:2.2)*lbm;
  protein_g=clamp(protein_g, 1.6*kg, 2.4*kg);
  let fat_g=Math.max(0.8*kg, target*0.25/9);
  const pKcal=protein_g*4, fKcal=fat_g*9;
  let carb_g=Math.max(0,(target-pKcal-fKcal)/4);
  if(carb_g<1.5*kg && deficit){ fat_g=Math.max(0.6*kg,(target-pKcal-1.5*kg*4)/9); carb_g=Math.max(0,(target-protein_g*4-fat_g*9)/4); }
  const fiber_g=Math.round(14*target/1000);
  const water_l=Math.round(kg*0.035*10)/10;
  const steps=sex==="male"?"8.000–12.000":"8.000–11.000";
  const pPct=Math.round(pKcal/target*100), cPct=Math.round(carb_g*4/target*100), fPct=Math.max(0,100-pPct-cPct);

  // --- training ---
  const style=trainingStyle(D.goal);
  const program=buildProgram(D, goal, exp, adi, D.body.level, style);
  const cardio=buildCardio(goal, adi, age);
  // --- #1 haftalık volüm (kas grubu başına set + hedef bandı) ---
  const volume=computeVolume(program, D.goal, exp);

  return {
    bmr:round(bmr,10), tdee:round(tdee,10), target:round(target,10),
    kcalAdjPct:Math.round(kcalAdj*100), actF:act.f, actName:act.name,
    bmi:bmi.toFixed(1), bmiCat:bmiCat(bmi), bf, adi, strategy:strategyLabel(D.goal,kcalAdj),
    lbm:lbm.toFixed(1), fm:fm.toFixed(1), ffmi:ffmi.toFixed(1),
    protein_g:Math.round(protein_g), fat_g:Math.round(fat_g), carb_g:Math.round(carb_g),
    pKcal:Math.round(pKcal), fKcal:Math.round(fat_g*9), cKcal:Math.round(carb_g*4),
    pPct, cPct, fPct, fiber_g, water_l, steps,
    protein_perkg:(protein_g/kg).toFixed(1), fat_perkg:(fat_g/kg).toFixed(1),
    program, cardio, volume, goal, exp, days:D.days, style
  };
}

/* -------- tek egzersiz nesnesi (swap için yeniden kullanılabilir) -------- */
function isBodyweight(e){ return e.eq.length===1 && e.eq[0]==="bw"; }
function isBandOnly(e){ return e.eq.length===1 && e.eq[0]==="band"; }
/* Tekrar aralığı: yüklenebilir hareketler hedefe göre; vücut ağırlığı/band SABİT/değişken yük olduğundan
   başarısızlığa ulaşmak için daha yüksek tekrar (Schoenfeld 2017 — yük değil, efor belirleyici).
   Zorlu bw hareketler (barfiks, nordic vb.) hareket-özel 'rr' ile daha düşük aralık alır. */
function repRangeFor(e, role, goal){
  if(e.rr) return e.rr;
  if(isBodyweight(e) || isBandOnly(e)) return role==="main" ? [12,25] : [15,30];
  return role==="main" ? goal.repC : goal.repI;
}
function exFromDB(e, role, opt, goal, exp){
  const isC=!!e.c;
  const range = e.dur?null:repRangeFor(e, role, goal);
  const loadTxt = e.dur ? "" : (isBodyweight(e) ? "vücut ağ." : (isBandOnly(e) ? "bant direnci" : loadTag(range[0])));
  return {
    n:e.n, m:e.m, c:isC, role, p:e.p, opt:!!opt,
    sets: role==="main"?exp.setsC:exp.setsI,
    rep: e.dur?"30-60 sn":(range[0]+"-"+range[1]),
    load: loadTxt,
    rest: fmtRest(role==="main"?goal.restC:goal.restI),
    desc:e.d||"", alt:e.a||"", tech:""
  };
}
/* -------- teknik etiketleri (süperset / son set RIR) -------- */
function applyTechnique(out, style){
  out.forEach(e=>{ if(e.tech===undefined) e.tech=""; else e.tech=""; });
  if(!style) return;
  if(style.tech==="ss"){
    const iso = out.map((e,ix)=>({e,ix})).filter(o=>!o.e.c && !o.e.opt);
    let g=0;
    for(let k=0;k+1<iso.length;k+=2){
      const lbl="Süperset "+String.fromCharCode(65+g);
      out[iso[k].ix].tech=lbl; out[iso[k+1].ix].tech=lbl; g++;
    }
  } else if(style.tech==="myo"){
    out.forEach(e=>{ if(!e.c && !e.opt) e.tech="Son set RIR 0–1"; });
  }
}

/* -------- program üretici: hedef + vücut tipine göre seçim -------- */
/* ===== #1/#3 HAFTALIK VOLÜM MODELİ (kas grubu başına set) =====
   Patern -> kas grubu ağırlıkları: birincil 1.0, sinerjist 0.5 (Schoenfeld volüm sayımı) */
const PATTERN_MUSCLE = {
  squat:[["quad",1],["glute",0.5]], hinge:[["ham",0.6],["glute",0.6]], lunge:[["quad",1],["glute",0.5]],
  push_h:[["chest",1],["triceps",0.5]], incline:[["chest",1],["triceps",0.5]], push_v:[["delt",1],["triceps",0.5]],
  pull_v:[["back",1],["biceps",0.5]], pull_h:[["back",1],["biceps",0.5]],
  chest_iso:[["chest",1]], delt_side:[["delt",1]], delt_rear:[["delt",1]],
  triceps:[["triceps",1]], biceps:[["biceps",1]],
  quad_iso:[["quad",1]], ham_iso:[["ham",1]], glute_iso:[["glute",1]],
  calf:[["calf",1]], core:[["core",1]]
};
const MUSCLE_ORDER = ["chest","back","delt","quad","ham","glute","biceps","triceps","calf","core"];
const MUSCLE_NAMES = { chest:"Göğüs", back:"Sırt", delt:"Omuz", quad:"Bacak (Ön/Quad)", ham:"Hamstring", glute:"Kalça", biceps:"Biceps", triceps:"Triceps", calf:"Baldır", core:"Karın" };
const MAJOR_MUSCLE = { chest:1, back:1, delt:1, quad:1, ham:1, glute:1 };
/* Hedef -> büyük kas haftalık set bandı [alt,üst]; exp.vol ile ölçeklenir (#3), küçük kaslar %60 */
function volBand(goalKey, exp, muscle){
  const base = { muscle:[10,20], strength:[6,12], fit:[8,16], slim:[8,16], health:[6,12], cardio:[6,12] }[goalKey] || [8,14];
  const v = exp.vol || 1;
  let lo = base[0]*v, hi = base[1]*v;
  if(!MAJOR_MUSCLE[muscle]){ lo*=0.6; hi*=0.6; }
  return [Math.round(lo), Math.round(hi)];
}
/* Programdan kas grubu başına haftalık set (sinerjist 0.5 dahil) */
function weeklyVolume(program){
  const v={};
  program.forEach(day=>day.exercises.forEach(ex=>{
    const mus=PATTERN_MUSCLE[ex.p]; if(!mus) return;
    const sets=+ex.sets||0;
    mus.forEach(([m,w])=> v[m]=(v[m]||0)+sets*w );
  }));
  return v;
}
/* volüm tablosu (kas grubu başına set + durum) — hem ilk üretimde hem güncellemede kullanılır */
function computeVolume(program, goalKey, expObj){
  const wv=weeklyVolume(program);
  return MUSCLE_ORDER.filter(m=>(wv[m]||0)>0 || MAJOR_MUSCLE[m]).map(m=>{
    const sets=Math.round((wv[m]||0)*2)/2;
    const band=volBand(goalKey, expObj, m), lo=band[0], hi=band[1];
    let label,color;
    if(sets<lo){ label="az"; color="#c9962f"; }
    else if(sets<=hi){ label="ideal"; color="#3b8f4e"; }
    else { label="yüksek"; color="#8a8290"; }
    const pct=Math.max(6, Math.min(100, Math.round(sets/Math.max(hi,1)*100)));
    return { name:MUSCLE_NAMES[m], sets, lo, hi, label, color, pct, major:!!MAJOR_MUSCLE[m] };
  });
}

/* ===== #5 SAKATLIK: seçenekler + riskli hareket blokları ===== */
const INJURY_OPTS = [{id:"knee",name:"Diz"},{id:"back",name:"Bel"},{id:"shoulder",name:"Omuz"},{id:"elbow",name:"Dirsek / Bilek"}];
const INJURY_BLOCK = {
  knee:["Sissy Squat","Hack Squat","Bulgarian Split Squat","Walking Lunge","Reverse Lunge","Step-Up","Lateral Lunge","Curtsy Lunge","Bodyweight Walking Lunge","Bodyweight Split Squat","Bodyweight Reverse Lunge","Reverse Nordic","Spanish Squat","Wall Sit","Landmine Squat","Leg Extension"],
  back:["Deadlift","Sumo Deadlift","Barbell Good Morning","Good Morning","Pendlay Row","Barbell Row","T-Bar Row","Landmine Row","45° Back Extension","Romanian Deadlift","Dumbbell RDL","Single-Leg RDL","Band Good Morning"],
  shoulder:["Chest Dip","Bench Dip","Cable Upright Row","Pike Push-up","Push Press","Overhead Barbell Press","Arnold Press"],
  elbow:["Skullcrusher","Diamond Push-up","Close-Grip Bench","Bench Dip","Barbell Curl","Preacher Curl"]
};

/* -------- program üretici: hedef + vücut tipine göre seçim -------- */
function buildProgram(D, goal, exp, adi, bodyLevel, style){
  const allow=EQUIP.find(e=>e.id===D.equipment).allow;
  let lib=EXDB.filter(e=>e.eq.every(q=>allow.includes(q)));
  // #5 sakatlık: riskli hareketleri havuzdan çıkar (havuz boşalırsa geri al)
  const inj=(D.injuries||[]);
  if(inj.length){
    const blocked=new Set();
    inj.forEach(k=>(INJURY_BLOCK[k]||[]).forEach(n=>blocked.add(n)));
    const filtered=lib.filter(e=>!blocked.has(e.n));
    if(filtered.length) lib=filtered;
  }
  const cap=skillCap(exp.id, adi, bodyLevel, D.body && D.body.musc);
  const cnt=dayCounts(D.goal, exp.id);
  const dayKeys=SPLIT_BY_DAYS[D.days]||SPLIT_BY_DAYS[3];
  const weekUsed=new Set();
  const weekVol={}; // #1 kas grubu başına biriken set
  const MAIN_REPEAT=20; // #4: ana bileşik hafta içinde tekrar edip ilerlesin (frekans)
  function addVol(ex){ const mus=PATTERN_MUSCLE[ex.p]; if(!mus) return; mus.forEach(([m,w])=> weekVol[m]=(weekVol[m]||0)+(+ex.sets||0)*w ); }

  function mkEx(e, role, opt){ return exFromDB(e, role, opt, goal, exp); }
  function choose(patterns, n, role, seen, out, opt){
    let taken=0, qi=0, guard=0;
    while(taken<n && guard<200){
      guard++;
      const pat=patterns[qi % patterns.length]; qi++;
      const cands=lib.filter(e=>e.p===pat);
      if(!cands.length){ if(qi>=patterns.length*3) break; continue; }
      let capped=cands.filter(e=>e.s<=cap); if(!capped.length) capped=cands.slice();
      if(role==="main"){ const c=capped.filter(e=>e.c); if(c.length) capped=c; }
      if(role==="aux"){ const iso=capped.filter(e=>!e.c); if(iso.length) capped=iso; }
      let pool=capped.filter(e=>!seen.has(e.n));
      if(!pool.length){ if(qi>=patterns.length*3) break; continue; }
      function sc(e){
        const base=eqPref(e.eq[0],role,D.goal,cap)-((e.beg&&cap>1)?60:0);
        // #4 ana harekette hafta içi tekrar ÖDÜLLÜ (ilerleme); yardımcıda tekrar CEZALI (çeşitlilik)
        const wk = role==="main" ? (weekUsed.has(e.n)?MAIN_REPEAT:0) : (weekUsed.has(e.n)?0:100);
        // #1 volüm dengesi: birincil kas haftalık üst hedefin 1.3 katını geçtiyse geri plana at (yumuşak)
        const pm=(PATTERN_MUSCLE[e.p]||[[null,0]])[0][0];
        const over = pm && (weekVol[pm]||0) >= volBand(D.goal,exp,pm)[1]*1.3 ? -80 : 0;
        return base+wk+over;
      }
      pool.sort((x,y)=>sc(x)-sc(y)); // artan; en iyi sonda
      const best=pool[pool.length-1];
      seen.add(best.n); weekUsed.add(best.n);
      const exObj=mkEx(best, role, opt);
      out.push(exObj); addVol(exObj);
      taken++;
    }
  }
  // #1b bonus slotu: SADECE o günün çalıştırdığı kaslar arasından en eksik olanı hedefle
  function deficitBonus(plan){
    const pats=[].concat(plan.main, plan.aux, plan.core?["core"]:[]);
    const dayMus=new Set();
    pats.forEach(p=>(PATTERN_MUSCLE[p]||[]).forEach(mw=>{ if(mw[1]>=0.5) dayMus.add(mw[0]); }));
    const M2P={ chest:["chest_iso"], back:["pull_h"], delt:["delt_side","delt_rear"], quad:["quad_iso"], ham:["ham_iso"], glute:["glute_iso","hinge"], calf:["calf"], biceps:["biceps"], triceps:["triceps"], core:["core"] };
    const scored=[...dayMus].map(m=>({m, def: volBand(D.goal,exp,m)[0]-(weekVol[m]||0)})).sort((a,b)=>b.def-a.def);
    const out=[]; scored.forEach(s=>(M2P[s.m]||[]).forEach(p=>out.push(p)));
    return out.length?out:["core"];
  }
  return dayKeys.map((key, di)=>{
    const plan=DAYPLANS[key];
    const seen=new Set(), out=[];
    choose(plan.main, cnt.main, "main", seen, out);
    choose(plan.aux, cnt.aux, "aux", seen, out);
    if(plan.core && D.goal!=="strength" && out.length<8) choose(["core"], 1, "aux", seen, out);
    if(D.goal!=="strength") choose(deficitBonus(plan), 1, "aux", seen, out, true); // #1b günün eksik kasına bonus
    out.forEach(e=>{ e._origName=e.n; }); // önerilen (ilk plan) hareket adı — swap geri dönüş için
    applyTechnique(out, style);
    return { title:(di+1)+". Gün — "+plan.name, key, focus:plan.focus, rir:goal.rir, rpe:goal.rpe, style:style.tag, method:style.method, superset:style.superset, tech:style.tech, exercises:out };
  });
}

/* -------- kardiyo v2: yaşa göre nabız bölgeleri + seanslar -------- */
function buildCardio(goal, adi, age){
  const hrmax=Math.round(208-0.7*age);
  const z=(lo,hi)=>Math.round(hrmax*lo)+"–"+Math.round(hrmax*hi)+" bpm";
  const L={type:"LISS — Düşük Tempo Sabit", zone:z(0.60,0.70)+" (%60–70)", desc:"Yürüyüş, eğimli koşu bandı, bisiklet veya eliptik. Konuşabileceğin tempo. Yağ oksidasyonu yüksek; kas ve toparlanmaya en az yük bindirir."};
  const M={type:"MISS — Orta Tempo", zone:z(0.70,0.80)+" (%70–80)", desc:"Tempolu yürüyüş, hafif koşu, kürek veya bisiklet. Hafif nefes nefese ama yine de cümle kurabilirsin."};
  const H={type:"HIIT — Yüksek Yoğunluklu İnterval", zone:"iş "+z(0.85,0.95)+" · dinlenme "+z(0.60,0.65), desc:"Örn. 30 sn yüksek efor (bisiklet/kürek/koşu) + 90 sn hafif, 8–10 tur. VO2max'ı ve antrenman sonrası kalori yakımını (EPOC) artırır. Haftada 2'yi geçme; ağır bacak gününden ayrı yap."};
  const lowImpact = adi==="high";
  let sessions=[], steps, weekly, note;
  switch(goal.cardio){
    case "high":
      sessions=[Object.assign({freq:"Haftada 3–4 gün", dur:"30–45 dk"},L), lowImpact?Object.assign({freq:"Haftada 1 gün (opsiyonel)", dur:"25 dk"},M):Object.assign({freq:"Haftada 1–2 gün", dur:"15–20 dk"},H)];
      steps="günde 8.000–12.000 adım"; weekly="Toplam hedef: haftada ~200–300 dk";
      note=lowImpact?"Eklem yükünü azaltmak için bisiklet/eliptik/yüzme tercih et; koşu ve zıplamadan kaçın.":"HIIT'i haftada 2 ile sınırla; kalan seanslar LISS olsun.";
      break;
    case "hiit":
      sessions=[Object.assign({freq:"Haftada 2–3 gün", dur:"20 dk"},H), Object.assign({freq:"Haftada 1–2 gün", dur:"25–30 dk"},M)];
      steps="günde 8.000–10.000 adım"; weekly="Dayanıklılık odaklı program";
      note="Interval günleri arasına en az 1 gün toparlanma koy; ısınmayı ihmal etme.";
      break;
    case "moderate":
      sessions=[Object.assign({freq:"Haftada 2–3 gün", dur:"25–30 dk"},M), Object.assign({freq:"Haftada 1–2 gün", dur:"30 dk"},L)];
      steps="günde 8.000–10.000 adım"; weekly="ACSM: haftada 150–300 dk orta şiddet";
      note="Düzenli, sürdürülebilir tempo; sağlık ve kalori dengesini destekler.";
      break;
    default: // low (muscle/strength)
      if(lowImpact){
        sessions=[Object.assign({freq:"Haftada 2–3 gün", dur:"25–35 dk"},L)];
        note="Kalori açığını desteklemek için düşük tempo kardiyo; kuvvet antrenmanından ayrı günde yap.";
        weekly="Açığı destekleyecek kadar; toparlanmayı koru";
      } else {
        sessions=[Object.assign({freq:"Haftada 1–2 gün", dur:"20–30 dk"},L)];
        note=goal.split==="strength"?"Kardiyoyu düşük tut ve kuvvetten ayrı günde yap — aşırı kardiyo kuvvet kazanımını azaltabilir (interference).":"Sağlık için hafif kardiyo yeterli; fazlası kas kazanımını yavaşlatabilir.";
        weekly="Minimum — kas kazanımını koru";
      }
      steps="günde 7.000–9.000 adım";
  }
  return {hrmax, sessions, steps, weekly, note};
}

const CLIENTS_KEY="nyxfit_clients_v1";
function loadClients(){ try{ const r=localStorage.getItem(CLIENTS_KEY); const a=r?JSON.parse(r):[]; return Array.isArray(a)?a:[]; }catch(e){ return []; } }
function persistClients(list){ try{ localStorage.setItem(CLIENTS_KEY, JSON.stringify(list)); return true; }catch(e){ return false; } }
function fmtDate(ts){ try{ return new Date(ts).toLocaleDateString("tr-TR",{day:"2-digit",month:"short",year:"numeric"}); }catch(e){ return ""; } }
function saveCurrentClient(){
  if(!S.result) return false;
  if(!S.data.startDate) S.data.startDate=new Date().toISOString();
  const list=loadClients();
  const nm=(S.data.name&&S.data.name.trim())?S.data.name.trim():"İsimsiz Danışan";
  const rec={
    id:S.currentClientId||("c"+Date.now()+Math.floor(Math.random()*1000)),
    name:nm, goal:(S.result.goal&&S.result.goal.name)||"", days:S.data.days, savedAt:Date.now(),
    data:JSON.parse(JSON.stringify(S.data)),
    result:JSON.parse(JSON.stringify(S.result))
  };
  const idx=list.findIndex(c=>c.id===rec.id);
  if(idx>=0) list[idx]=rec; else list.unshift(rec);
  const ok=persistClients(list);
  if(ok){ S.currentClientId=rec.id; S._dirty=false; }
  return ok;
}
function deleteClient(id){ return persistClients(loadClients().filter(c=>c.id!==id)); }
function openClient(id){
  const rec=loadClients().find(c=>c.id===id); if(!rec) return;
  try{
    S.data=JSON.parse(JSON.stringify(rec.data));
    S.result=JSON.parse(JSON.stringify(rec.result));
    S.currentClientId=rec.id; S._dirty=false;
    go("result");
  }catch(e){ toast("Danışan yüklenemedi"); }
}

/* ---------------- SVG DONUT (html2canvas uyumlu) — dilim içi eğimli % etiketi ---------------- */
function _polar(cx,cy,r,deg){ const a=(deg-90)*Math.PI/180; return [cx+r*Math.cos(a), cy+r*Math.sin(a)]; }
function _arcPath(cx,cy,r,a0,a1){
  const [x0,y0]=_polar(cx,cy,r,a0), [x1,y1]=_polar(cx,cy,r,a1);
  const large=Math.abs(a1-a0)>180?1:0, sweep=a1>=a0?1:0;
  return `M ${x0.toFixed(2)} ${y0.toFixed(2)} A ${r.toFixed(2)} ${r.toFixed(2)} 0 ${large} ${sweep} ${x1.toFixed(2)} ${y1.toFixed(2)}`;
}
function svgDonut(size, stroke, segs){
  const r=(size-stroke)/2, cx=size/2, cy=size/2, C=2*Math.PI*r;
  const fs=Math.max(9, Math.round(stroke*0.52));
  let off=0, arcs="", defs="", labels="", idc=0;
  const uid=Math.floor(Math.random()*1e6);
  segs.forEach(s=>{
    const len=C*s.pct/100;
    arcs+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${stroke}" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 ${cx} ${cy})"/>`;
    if(s.label && s.pct>=7){
      const a0=off/C*360, a1=(off+len)/C*360, mid=(a0+a1)/2;
      const flip=(mid>90 && mid<270);           // alt yarıda ters dönmesin diye yolu tersle
      const pa0=flip?a1:a0, pa1=flip?a0:a1;
      const id="dl"+uid+"_"+(idc++);
      defs+=`<path id="${id}" d="${_arcPath(cx,cy,r,pa0,pa1)}" fill="none"/>`;
      labels+=`<text font-family="Oswald, Arial, sans-serif" font-size="${fs}" font-weight="700" fill="${s.tc||'#ffffff'}" letter-spacing="0.2"><textPath href="#${id}" startOffset="50%" text-anchor="middle" dominant-baseline="central">${s.label}</textPath></text>`;
    }
    off+=len;
  });
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><defs>${defs}</defs>`
    +`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#eef2f5" stroke-width="${stroke}"/>${arcs}${labels}</svg>`;
}

const EQ_TR={barbell:"Barbell",dumbbell:"Dumbbell",machine:"Makine",cable:"Kablo",bw:"Vücut ağırlığı",band:"Band"};
function eqLabel(eqArr){ return (eqArr||[]).map(q=>EQ_TR[q]||q).join("/"); }
function escAttr(s){ return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;"); }
function altCandidates(ex, dayExercises){
  const allow=EQUIP.find(e=>e.id===S.data.equipment).allow;
  const used=new Set(dayExercises.map(x=>x.n));
  let c=EXDB.filter(e=> e.p===ex.p && (!!e.c===!!ex.c) && e.eq.every(q=>allow.includes(q)));
  c=c.filter(e=> e.n===ex.n || !used.has(e.n)); // gündeki diğer hareketleri hariç tut (kendisi hariç)
  // önerileni (orijinal) her zaman listede tut
  const orig=ex._origName||ex.n;
  if(!c.some(e=>e.n===orig)){ const oe=EXDB.find(e=>e.n===orig); if(oe && oe.eq.every(q=>allow.includes(q)) && !used.has(oe.n)) c.push(oe); }
  return c;
}

const TRACK_WEEKS = 12;
function trackData(){ if(!S.data.tracking) S.data.tracking={}; return S.data.tracking; }
function setTrack(week, id, val){ const t=trackData(); if(!t[week]) t[week]={}; if(val===""||val==null) delete t[week][id]; else t[week][id]=val; S._dirty=true; refreshTrackChange(); }
function latestTrackWeek(){ const t=trackData(); let mx=0; Object.keys(t).forEach(w=>{ if(t[w]&&Object.keys(t[w]).length) mx=Math.max(mx,+w); }); return mx; }
function trackDelta(id){
  const t=trackData(), last=latestTrackWeek();
  const a=t["1"]&&t["1"][id]!==undefined?parseFloat(t["1"][id]):null;
  const b=last>1&&t[last]&&t[last][id]!==undefined?parseFloat(t[last][id]):null;
  if(a===null||b===null||isNaN(a)||isNaN(b)) return null;
  return { from:a, to:b, diff:Math.round((b-a)*10)/10, week:last };
}
function trackChangeHTML(){
  const last=latestTrackWeek();
  if(last<2) return `<div class="tc-empty">En az 2 farklı hafta doldurulduğunda H1 → güncel hafta değişimi burada özetlenir.</div>`;
  const rows=TRACK_METRICS.map(m=>{
    const d=trackDelta(m.id); if(!d) return "";
