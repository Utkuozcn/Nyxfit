/* ===== #2 PROGRAM GÜNCELLEME — hafta bazlı blok periyodizasyonu ===== */
const WEEK_MS=7*24*60*60*1000;
function weeksElapsed(){
  const sd=S.data.startDate; if(!sd) return null;
  return Math.max(1, Math.floor((Date.now()-new Date(sd).getTime())/WEEK_MS)+1);
}
function rirBase(goalKey){ const s=(GOALS[goalKey]&&GOALS[goalKey].rir)||"1-2"; const m=s.match(/(\d+)\s*-\s*(\d+)/); return m?+m[2]:(parseInt(s)||2); }
function phaseFor(week, goalKey){
  week=Math.max(1, week|0);
  const block=Math.floor((week-1)/4)+1, wib=((week-1)%4)+1, base=rirBase(goalKey);
  if(wib===4){
    return { week, block, wib, type:"deload", label:`Blok ${block} · Deload (Hafta ${week})`,
      setsMul:0.5, rir:`${base+2}-${base+3}`, color:"#3f7cc0",
      note:"Deload: volüm ~%50, yükü ~%40 azalt, başarısızlıktan uzak dur — süper telafi için toparlanma haftası." };
  }
  const labels={1:"Birikim 1 — baz",2:"Birikim 2 — yüklen",3:"Zirve — başarısızlığa yakın"};
  const rir = wib===1?`${base}`:(wib===2?`${Math.max(0,base-1)}`:"0-1");
  const notes={
    1:"Blok başı: teknik ve baz volüm (RIR "+base+", 2-3 tekrar yedek).",
    2:"Volüm/efor kademeli artışı; ağırlığı veya tekrarı bir tık yukarı çek (çift-ilerleme).",
    3:"Zirve hafta: setlerde başarısızlığa yakın (RIR 0-1); sonraki hafta deload gelir."
  };
  return { week, block, wib, type:"accum", label:`Blok ${block} · ${labels[wib]} (Hafta ${week})`,
    setsMul: wib===3?1.15:1.0, rir, color:"#a81f33", note:notes[wib] };
}
function trackingAdvice(){
  const t=S.data.tracking||{}, last=latestTrackWeek();
  if(last<2) return null;
  const delta=id=>{ const a=t["1"]&&t["1"][id]!==undefined?parseFloat(t["1"][id]):null, b=t[last]&&t[last][id]!==undefined?parseFloat(t[last][id]):null; return (a!==null&&b!==null&&!isNaN(a)&&!isNaN(b))?(b-a):null; };
  const low=[delta("perf"),delta("enerji"),delta("uyku")].filter(v=>v!==null&&v<=-1).length;
  const lastVals=["perf","enerji","uyku"].map(id=>t[last]&&t[last][id]!==undefined?parseFloat(t[last][id]):null).filter(v=>v!==null&&!isNaN(v));
  const avgLow=lastVals.length&&(lastVals.reduce((a,b)=>a+b,0)/lastVals.length)<=4;
  if(low>=2||avgLow) return { tone:"warn", txt:"Performans/enerji/uyku düşüş eğiliminde — deload'ı öne almayı veya volümü sabit tutmayı düşün." };
  return { tone:"ok", txt:"Toparlanma ve performans iyi görünüyor — planlı ilerle, çift-ilerlemeyle yükü kademeli artır." };
}
function applyProgramUpdate(week){
  if(!S.result) return;
  week=Math.max(1, week|0);
  if(!S.data.startDate) S.data.startDate=new Date().toISOString();
  S.data.currentWeek=week;
  const ph=phaseFor(week, S.data.goal);
  S.result.program.forEach(day=>{
    day.rir=ph.rir; day.phaseNote=ph.note; day.phaseType=ph.type;
    day.exercises.forEach(ex=>{
      if(ex._baseSets===undefined) ex._baseSets=ex.sets;
      let ns;
      if(ph.type==="deload") ns=Math.max(2, Math.round(ex._baseSets*0.5));
      else ns=Math.min(ex._baseSets+2, Math.max(ex._baseSets, Math.round(ex._baseSets*ph.setsMul)));
      ex.sets=ns;
    });
  });
  S.result.phase={week:ph.week, block:ph.block, wib:ph.wib, type:ph.type, label:ph.label, rir:ph.rir, note:ph.note, color:ph.color};
  S.result.volume=computeVolume(S.result.program, S.data.goal, S.result.exp);
  S._dirty=true; closeRef(); go("result"); saveCurrentClient();
  toast("Program Hafta "+week+"'e göre güncellendi");
}
function previewPhase(){
  const w=Math.max(1,(+$("#updWeek").value)||1), ph=phaseFor(w, S.data.goal);
  const setTxt = ph.type==="deload"?"Setler ~%50 (deload)":(ph.wib===3?"Setler +%15 (zirve)":"Setler baz düzeyde");

  report.innerHTML=buildReportHTML();
  // fontların yüklendiğinden emin ol
  try{ if(document.fonts&&document.fonts.ready) await document.fonts.ready; }catch(e){}
  await new Promise(r=>setTimeout(r,120));

  try{
    sub.textContent="Kütüphaneler yükleniyor…";
    await ensureLibs();
    sub.textContent="Sayfalar oluşturuluyor…";
    const pages=$$("#report .pg");
    const { jsPDF }=window.jspdf;
    const pdf=new jsPDF("p","mm","a4");
    for(let i=0;i<pages.length;i++){
      const land=pages[i].classList.contains("pg-land");
      const canvas=await html2canvas(pages[i],{scale:2,backgroundColor:"#ffffff",useCORS:true,logging:false,windowWidth:land?1123:794});
      const img=canvas.toDataURL("image/jpeg",0.95);
      if(i>0) pdf.addPage("a4", land?"l":"p");
      const PW=land?297:210, PH=land?210:297;
      // her mantıksal sayfayı tek A4'e sığdır (contain) — içerik asla kesilmez
      const scale=Math.min(PW/canvas.width, PH/canvas.height);
      const w=canvas.width*scale, h=canvas.height*scale;
      const x=(PW-w)/2, y=Math.max(0,(PH-h)/2);
      pdf.addImage(img,"JPEG",x,y,w,h);
    }
    const fname="NyxFit_Program_"+(d0name())+".pdf";
    pdf.save(fname);
    loading.classList.remove("show");
    toast("PDF indirildi: "+fname);
  }catch(err){
    loading.classList.remove("show");
    console.error(err);
    // fallback: yazdır penceresi
    printFallback();
  }
}
function d0name(){const n=(S.data.name||"Danisan").replace(/[^a-zA-Z0-9ğüşöçıİĞÜŞÖÇ]/g,"_").replace(/_+/g,"_");return n.slice(0,24);}

function printFallback(){
  const html=`<!DOCTYPE html><html lang="tr"><head><meta charset="utf-8"><title>NyxFit Program</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>${document.querySelector("style").textContent}
  body{background:#fff;display:block;padding:0}#report{margin:0 auto}@media print{@page{size:A4;margin:0}#report .pg{page-break-after:always}}</style></head>
  <body><div id="report">${buildReportHTML()}</div>
  <script>window.onload=function(){setTimeout(function(){window.print();},600);}<\/script></body></html>`;
  const w=window.open("","_blank");
  if(!w){toast("Açılır pencere engellendi. Lütfen izin verin.");return;}
  w.document.write(html); w.document.close();
  toast("Yazdırma penceresi açıldı — 'PDF olarak kaydet' seçin.");
}

/* PWA service worker (yalnızca http/https'te) */
if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  window.addEventListener("load",()=>{navigator.serviceWorker.register("sw.js").catch(function(){});});
}

/* ---------------- BAŞLAT ---------------- */
render();
</script>
